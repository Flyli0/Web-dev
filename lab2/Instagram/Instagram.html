<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name = "autor" content = "Kirill">
    <title>Instagram</title>
    <link rel = "stylesheet" type = "text/css" href = "IG.css">
</head>
<body>
    <section>
        <img src = "mainlogo.png" alt = "instagram" id = "logo">
        <h1>Посмотрите, какими моментами из жизни поделились ваши близкие друзья.</h1>
        <img src = "instabig.png" alt = "instagram is the social media" id = "bigpic">
        <aside id = "loginform">
            <form id = "login">
                <fieldset>
                <label>Войти в Instagram</label>
                <input type = "number" type = "email" type = "text" placeholder = "Имя пользователя, номер мобильного телефона или электронный адрес" class = "logbutton">
                <input type = "password" placeholder="Пароль" class = "logbutton">
                <button class = "in">Войти</button>
                <button class = "in">Забыли пароль?</button>
                </fieldset>
                <fieldset>
                <button class = "in"><img src = "Facebook_logo_PNG12.png" id = "facebook" alt = "log in by facebook"> Войти через Facebook</button>
                <button class = "in">Создать новый Аккаунт</button>
                </fieldset>
            </form>
            <img src = "meta-brand.png" alt = "meta">
        </aside>
        <footer>
            <p>footer text</p>
        </footer>
    </section>


</body>
</html>
