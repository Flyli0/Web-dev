<!DOCTYPE html>
<html lang = "en">
    <head>
        <title>Facebook</title>
        <meta charset = "UTF-8">
        <meta name = "author" content = "Kirill">
        <link href = "FBstyle.css" rel = "stylesheet">

    </head>
    <body>
        <div id = "main">
            <section id = "logo">
                <h1>facebook</h1>
                <p id = "Promo">Facebook помогает всегда оставаться на связи и общаться со своими знакомыми</p>
            </section>
            <div id = "loginForm">
                <form>
                    <fieldset>
                        <input type = "email" type = "number" id = "login" placeholder="Электронный адрес или номер телефона" class = "login logbutton">
                        <input type = "password" id = "pass" placeholder="Пароль" class = "login logbutton">
                        <button class = "logbutton" id = "Come">Вход</button>
                        <button class = "logbutton" id = "forgot">Забыли пароль?</button>
                    </fieldset>
                    <hr id = "formsep">
                    <fieldset>
                        <button class = "logbutton" id = "NewAcc">Создать новый аккаунт</button>
                    </fieldset>
                </form>
                <p id = "form_footer"><b>Создать страницу</b> знаменитости, музыкальной группы или компании</p>
            </div>
        </div>
    </body>
    <footer>
        <hr>
        Some footer text
    </footer>
</html>
