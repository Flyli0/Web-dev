<div class = "card">
  <section class = "image">
    <a [href] = "product()!.link" target = '_blank'>
      <img class = "p_img" [src] = "product()!.image" [alt] = "product()!.name">
    </a>
  </section>
  <h2> {{product()!.name}} </h2>
  <p class = 'desc'>{{product()!.description}}</p>
  <p class = 'price'>{{product()!.price}}₸</p>
  <p class = 'rating'>⭐{{product()!.rating}}</p>
  <div class = "buttons">
  <button (click) ="onToggleFavorite()" class = "love-button" ><img [src] = "image(isFavorite())" alt = "love"></button>
  <button class="share-btn" (click)="shareProduct(product()!.link)">
    Share
  </button></div>
  <div class = "buttons">
  <button class = "like"><img src = "assets/images/thumbup.png" alt = "like" (click)="increment()" >{{likenum()}}</button>
  <button class = "love-button" (mouseover) = "ChangeImg()" (mouseleave)="ChangeBack()" (click)="onRemove()"><img [src] = "trashcan" alt = "remove"></button>
  </div>
  <a class = 'btn' [href] = "product()!.link" target = "_blank">Buy on Kaspi</a>
  <button class = "buttons" id = "view" (click)="onViewMore()">View more</button>
</div>
