<p>Favorites<3 {{favoriteCount()}}</p>

<div class = "visibility">
  <button (click)="showFavoriteOnly(true)" > Show favorites only</button>
  <button (click)="showFavoriteOnly(false)">Show all</button>
</div>
<div class = "grid">
  @if(filteredProducts() .length == 0){
    <p>Choose category</p>
  }
  @else if(displayedProducts() .length == 0){
    <p>No products found</p>
  }
  @else{
    @for(p of displayedProducts(); track p.id){
      <app-product-card [product] = "p" (toggle)="toggleFavorite($event)" [isFavorite] = "isFavorite(p.id)" (remove)="remove($event)"></app-product-card>
    }
  }
</div>
