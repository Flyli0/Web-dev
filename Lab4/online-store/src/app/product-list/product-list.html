
<div class = "grid">
  <div class = "card" *ngFor = "let p of products">
    <section class = "image">
      <a [href] = "p.link" target = '_blank'>
        <img [src] = "p.image" [alt] = "p.name">
      </a>
    </section>
    <h2> {{p.name}} </h2>
    <p class = 'desc'>{{p.description}}</p>
    <p class = 'price'>{{p.price}}₸</p>
    <p class = 'rating'>⭐{{p.rating}}</p>
    <button class="share-btn" (click)="shareProduct(p.link)">
      Share
    </button>
    <a class = 'btn' [href] = "p.link" target = "_blank">Buy on Kaspi</a>
  </div>
</div>
