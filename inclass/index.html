<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>T3</title>
    <link rel = "stylesheet" type = "text/css" href = "styles.css"/>
    <link rel = "script" type = "text/javascript" href = "javascript.js">
</head>
<body>
<header>
    <h1>ColorSwitcher</h1>
</header>
<section id = "main">
    <p>Current color <span id = "color-code">#FFFFFF</span></p>
    <div class = "color-buttons">
        <button class = "color-btn" data-color = "#E74C3C">Red</button>
        <button class = "color-btn" data-color = "#2ECC71">Green</button>
        <button class = "color-btn" data-color = "#3498DB">Blue</button>
        <button class = "color-btn" data-color = "#9B59B6">Purple</button>
        <button class = "color-btn" data-color = "#E76E22">Orange</button>
    </div>
    <button id = "random">Random color</button>
    <button id = "reset">Reset</button>
</section>
</body>
</html>
